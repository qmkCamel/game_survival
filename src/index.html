<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互联网职场生存 - 文字冒险游戏</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>互联网职场生存</h1>
            <div class="difficulty-bar">
                <label for="difficulty-select">难度:</label>
                <select id="difficulty-select">
                    <option value="normal" selected>普通</option>
                    <option value="hardcore">硬核</option>
                </select>
            </div>
            <div class="stats-container">
                <div class="stat">
                    <span class="stat-label">工作表现:</span>
                    <div class="progress-bar">
                        <div id="performance-bar" class="progress"></div>
                    </div>
                    <span id="performance-value">75%</span>
                </div>
                <div class="stat">
                    <span class="stat-label">心理健康:</span>
                    <div class="progress-bar">
                        <div id="mental-bar" class="progress"></div>
                    </div>
                    <span id="mental-value">80%</span>
                </div>
                <div class="stat">
                    <span class="stat-label">精力:</span>
                    <div class="progress-bar">
                        <div id="energy-bar" class="progress"></div>
                    </div>
                    <span id="energy-value">70%</span>
                </div>
                <div class="stat">
                    <span class="stat-label">人情:</span>
                    <span id="favors-value">0</span>
                </div>
            </div>
        </div>
        
        <div class="game-content">
            <div id="story-text" class="story-container"></div>
            <div id="choices-container" class="choices-container"></div>
            <div id="hint-text" class="hint-text" aria-live="polite"></div>
        </div>

        <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true"></div>
        
        <div class="inventory">
            <div class="inventory-section">
                <h3>技能</h3>
                <div id="skills-list"></div>
            </div>
            <div class="inventory-section">
                <h3>盟友</h3>
                <div id="allies-list"></div>
            </div>
        </div>
        
        <div class="footer">
            <button id="restart-btn">重新开始</button>
            <button id="achievements-btn">称号图鉴</button>
        </div>
    </div>

    <script>
        // 默认配置：可按需改为 true 观察行为
        window.DEBUG = false;
    </script>
    
    <!-- 场景文件 -->
    <script>
        // 默认启用 JSON 场景数据（更稳定、可维护）
        window.USE_SCENE_DATA = true;
    </script>
    <script src="scenes/scenes_manifest.js"></script>
    <script src="scenes/scenes_loader.js"></script>
    <script src="scenes/scenes_data_loader.js"></script>
    
    <!-- 游戏逻辑 -->
    <script src="game.js"></script>
    
    <!-- 测试框架（仅开发用，避免上线干扰） -->
    <!-- <script src="../tests/game_tests.js"></script> -->
</body>
</html>
